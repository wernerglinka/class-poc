<!--
  Row Review Sidebar UI.

  Polls the server for the active row and renders it as a labeled,
  editable record. Each field is a textarea; changed fields are
  tracked as dirty. While unsaved edits exist, polling keeps running
  but re-rendering is suspended so the reviewer's work is never
  overwritten. Save writes only the changed cells back to the sheet.

  Formula cells are shown read-only to avoid clobbering computed
  values with static text.
-->
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root {
      --color-text: #202124;
      --color-label: #5f6368;
      --color-border: #dadce0;
      --color-notice: #5f6368;
      --color-header-bg: #f1f3f4;
      --color-dirty: #e37400;
      --color-action: #1a73e8;
      --color-error: #c5221f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding-bottom: 64px; /* room for the save bar */
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: var(--color-text);
    }

    .record-header {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 10px 12px;
      background: var(--color-header-bg);
      border-bottom: 1px solid var(--color-border);
      font-weight: 500;
    }

    .record-fields {
      padding: 4px 12px 16px;
    }

    .field {
      padding: 10px 0;
      border-bottom: 1px solid var(--color-border);
    }

    .field:last-child {
      border-bottom: none;
    }

    .field-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--color-label);
      margin-bottom: 4px;
    }

    .field.is-dirty .field-label::after {
      content: ' • edited';
      color: var(--color-dirty);
      text-transform: none;
      letter-spacing: normal;
    }

    .field-input {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 4px 6px;
      margin-left: -6px;
      font: inherit;
      line-height: 1.5;
      color: inherit;
      background: transparent;
      resize: none;
      overflow: hidden;
    }

    .field-input:hover:not([readonly]) {
      border-color: var(--color-border);
    }

    .field-input:focus:not([readonly]) {
      outline: none;
      border-color: var(--color-action);
      background: #fff;
    }

    .field-input[readonly] {
      color: var(--color-label);
      cursor: default;
    }

    .field-formula-note {
      font-size: 11px;
      color: var(--color-label);
      font-style: italic;
    }

    .notice {
      padding: 24px 12px;
      color: var(--color-notice);
      text-align: center;
    }

    .save-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: #fff;
      border-top: 1px solid var(--color-border);
    }

    .save-bar.is-visible {
      display: flex;
    }

    .save-bar button {
      font: inherit;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .save-bar button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #saveButton {
      background: var(--color-action);
      color: #fff;
      border: none;
    }

    #discardButton {
      background: transparent;
      color: var(--color-action);
      border: none;
    }

    .save-status {
      margin-left: auto;
      font-size: 12px;
      color: var(--color-label);
    }

    .save-status.is-error {
      color: var(--color-error);
    }
  </style>
</head>
<body>
  <div id="recordHeader" class="record-header">Row Viewer</div>
  <div id="recordContainer" class="record-fields">
    <div class="notice">Loading&hellip;</div>
  </div>

  <div id="saveBar" class="save-bar">
    <button id="saveButton" type="button">Save</button>
    <button id="discardButton" type="button">Discard</button>
    <span id="saveStatus" class="save-status"></span>
  </div>

  <script>
    /** How often to check which row is selected, in milliseconds. */
    const POLL_INTERVAL_MS = 1000;

    /** Fingerprint of the last rendered record, to avoid redundant re-renders. */
    let lastRenderedFingerprint = null;

    /** The record currently rendered; source of truth for save targets. */
    let currentRecord = null;

    /** True while a save request is in flight. */
    let saveInProgress = false;

    /**
     * Asks the server for the active row record. The success and
     * failure handlers both schedule the next poll, so requests
     * never overlap.
     *
     * @returns {void}
     */
    const requestActiveRow = () => {
      google.script.run
        .withSuccessHandler( handleRowRecord )
        .withFailureHandler( scheduleNextPoll )
        .getActiveRowRecord();
    };

    /**
     * Schedules the next poll of the active selection.
     *
     * @returns {void}
     */
    const scheduleNextPoll = () => {
      window.setTimeout( requestActiveRow, POLL_INTERVAL_MS );
    };

    /**
     * Renders the polled record unless the reviewer has unsaved edits
     * or a save is running, then schedules the next poll.
     *
     * @param {Object} record - RowRecord from the server
     * @returns {void}
     */
    const handleRowRecord = ( record ) => {
      if ( hasUnsavedEdits() || saveInProgress ) {
        scheduleNextPoll();
        return;
      }

      const fingerprint = JSON.stringify( record );

      if ( fingerprint !== lastRenderedFingerprint ) {
        lastRenderedFingerprint = fingerprint;
        renderRecord( record );
      }

      scheduleNextPoll();
    };

    /**
     * Reports whether any field differs from its original value.
     *
     * @returns {boolean} True when unsaved edits exist
     */
    const hasUnsavedEdits = () => {
      return collectEdits().length > 0;
    };

    /**
     * Collects the changed fields as edits ready to send to the server.
     *
     * @returns {Array<{columnNumber: number, value: string}>} Changed cells
     */
    const collectEdits = () => {
      const inputs = Array.from( document.querySelectorAll( '.field-input[data-column-number]' ) );

      return inputs
        .filter( ( input ) => input.value !== input.dataset.originalValue )
        .map( ( input ) => ( {
          columnNumber: Number( input.dataset.columnNumber ),
          value: input.value
        } ) );
    };

    /**
     * Renders a row record into the sidebar.
     *
     * @param {Object} record - RowRecord from the server
     * @returns {void}
     */
    const renderRecord = ( record ) => {
      currentRecord = record;

      const headerElement = document.getElementById( 'recordHeader' );
      const containerElement = document.getElementById( 'recordContainer' );

      setSaveStatus( '' );

      if ( record.message ) {
        headerElement.textContent = record.sheetName;
        containerElement.replaceChildren( buildNotice( record.message ) );
        updateSaveBar();
        return;
      }

      headerElement.textContent = `${ record.sheetName } — Row ${ record.rowNumber }`;
      containerElement.replaceChildren( ...record.fields.map( buildFieldElement ) );

      // Size textareas to their content after they are in the DOM.
      containerElement.querySelectorAll( '.field-input' ).forEach( autoSizeInput );
      updateSaveBar();
    };

    /**
     * Builds the DOM element for a single field: a label plus an
     * auto-growing textarea. Formula cells render read-only.
     *
     * @param {Object} field - RowField from the server
     * @returns {HTMLElement} The field element
     */
    const buildFieldElement = ( field ) => {
      const fieldElement = document.createElement( 'div' );
      fieldElement.className = 'field';

      const labelElement = document.createElement( 'div' );
      labelElement.className = 'field-label';
      labelElement.textContent = field.label;

      const inputElement = document.createElement( 'textarea' );
      inputElement.className = 'field-input';
      inputElement.rows = 1;
      inputElement.value = field.value;

      if ( field.isFormula ) {
        inputElement.readOnly = true;

        const formulaNote = document.createElement( 'div' );
        formulaNote.className = 'field-formula-note';
        formulaNote.textContent = 'computed by formula — edit in the sheet';
        fieldElement.append( labelElement, inputElement, formulaNote );
        return fieldElement;
      }

      inputElement.dataset.columnNumber = String( field.columnNumber );
      inputElement.dataset.originalValue = field.value;

      inputElement.addEventListener( 'input', () => {
        autoSizeInput( inputElement );
        fieldElement.classList.toggle(
          'is-dirty',
          inputElement.value !== inputElement.dataset.originalValue
        );
        updateSaveBar();
      } );

      fieldElement.append( labelElement, inputElement );
      return fieldElement;
    };

    /**
     * Grows a textarea to fit its content.
     *
     * @param {HTMLTextAreaElement} input - Textarea to resize
     * @returns {void}
     */
    const autoSizeInput = ( input ) => {
      input.style.height = 'auto';
      input.style.height = `${ input.scrollHeight }px`;
    };

    /**
     * Shows or hides the save bar based on dirty state.
     *
     * @returns {void}
     */
    const updateSaveBar = () => {
      const saveBar = document.getElementById( 'saveBar' );
      saveBar.classList.toggle( 'is-visible', hasUnsavedEdits() );
    };

    /**
     * Sends the changed fields to the server and re-renders with the
     * refreshed record on success.
     *
     * @returns {void}
     */
    const saveEdits = () => {
      const edits = collectEdits();

      if ( edits.length === 0 || saveInProgress || currentRecord === null ) {
        return;
      }

      saveInProgress = true;
      setSaveButtonsDisabled( true );
      setSaveStatus( 'Saving…' );

      google.script.run
        .withSuccessHandler( handleSaveSuccess )
        .withFailureHandler( handleSaveFailure )
        .updateRowFields( currentRecord.sheetName, currentRecord.rowNumber, edits );
    };

    /**
     * Renders the refreshed record after a successful save.
     *
     * @param {Object} record - Refreshed RowRecord from the server
     * @returns {void}
     */
    const handleSaveSuccess = ( record ) => {
      saveInProgress = false;
      setSaveButtonsDisabled( false );
      lastRenderedFingerprint = JSON.stringify( record );
      renderRecord( record );
      setSaveStatus( 'Saved' );
    };

    /**
     * Reports a failed save and leaves the edits in place so nothing
     * is lost.
     *
     * @param {Error} error - Failure reported by google.script.run
     * @returns {void}
     */
    const handleSaveFailure = ( error ) => {
      saveInProgress = false;
      setSaveButtonsDisabled( false );
      setSaveStatus( `Save failed: ${ error.message }`, true );
    };

    /**
     * Throws away unsaved edits and re-renders from the sheet on the
     * next poll.
     *
     * @returns {void}
     */
    const discardEdits = () => {
      document.querySelectorAll( '.field-input[data-column-number]' ).forEach( ( input ) => {
        input.value = input.dataset.originalValue;
        autoSizeInput( input );
        input.closest( '.field' ).classList.remove( 'is-dirty' );
      } );

      updateSaveBar();
      setSaveStatus( '' );
      lastRenderedFingerprint = null; // force a fresh render on next poll
    };

    /**
     * Enables or disables the save bar buttons.
     *
     * @param {boolean} disabled - True to disable
     * @returns {void}
     */
    const setSaveButtonsDisabled = ( disabled ) => {
      document.getElementById( 'saveButton' ).disabled = disabled;
      document.getElementById( 'discardButton' ).disabled = disabled;
    };

    /**
     * Sets the status text in the save bar.
     *
     * @param {string} message - Status text, empty to clear
     * @param {boolean} [isError] - True to style as an error
     * @returns {void}
     */
    const setSaveStatus = ( message, isError ) => {
      const statusElement = document.getElementById( 'saveStatus' );
      statusElement.textContent = message;
      statusElement.classList.toggle( 'is-error', Boolean( isError ) );
    };

    /**
     * Builds a centered notice element.
     *
     * @param {string} message - Notice text
     * @returns {HTMLElement} The notice element
     */
    const buildNotice = ( message ) => {
      const noticeElement = document.createElement( 'div' );
      noticeElement.className = 'notice';
      noticeElement.textContent = message;
      return noticeElement;
    };

    document.getElementById( 'saveButton' ).addEventListener( 'click', saveEdits );
    document.getElementById( 'discardButton' ).addEventListener( 'click', discardEdits );

    requestActiveRow();
  </script>
</body>
</html>
